spring.application.name=segundo-parcial
server.port=8081

## Configuracion comun para entorno local.
spring.datasource.url=jdbc:postgresql://localhost:5432/segundo_parcial
spring.datasource.username=segundo_parcial
spring.datasource.password=segundo_parcial
spring.datasource.driver-class-name=org.postgresql.Driver

## JPA comun. El ddl-auto se ajusta por perfil en application-dev/prod.properties.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

## Clave JWT local.
app.jwt.secret=second-parcial-dev-secret-key-change-me-second-parcial-dev-secret-key-change-me
app.jwt.expiration-ms=86400000
